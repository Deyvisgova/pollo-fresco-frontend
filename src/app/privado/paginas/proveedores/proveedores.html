<!-- Contenido base para la vista de proveedores -->
<section class="seccion">
  <div class="seccion__encabezado">
    <h2>Proveedores</h2>
    <p>
      Administra proveedores y registra entregas de pollos desde el panel
      privado.
    </p>
  </div>

  <nav class="seccion__tabs">
    <a *ngIf="!esVendedor" routerLink="crud" routerLinkActive="tab--activa" class="tab"
      >Control de Proveedores</a
    >
    <a routerLink="registros" routerLinkActive="tab--activa" class="tab"
      >Registro de pollos</a
    >
    <a *ngIf="!esVendedor" routerLink="pagos" routerLinkActive="tab--activa" class="tab"
      >Historial de Pago</a
    >
  </nav>

  <div class="seccion__contenido">
    <router-outlet></router-outlet>
  </div>
</section>
