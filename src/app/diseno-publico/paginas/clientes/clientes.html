<section id="clientes" class="clientes pb-5 bg-light">
  <div class="pagina-banner pagina-banner--portada pagina-banner--clientes">
    <img
      [src]="contenido().banner_clientes_url"
      alt="Banner de Clientes"
      loading="eager"
      fetchpriority="high"
      decoding="sync"
      (error)="usarBannerFallback($event)"
    >
  </div>

  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">{{ contenido().titulo_clientes }}</h2>
      <p class="text-muted">{{ contenido().descripcion_clientes }}</p>
    </div>

    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let t of contenido().testimonios">
        <mat-card class="clientes__card h-100">
          <mat-card-content>
            <span class="clientes__icono" aria-hidden="true">
              <mat-icon>verified</mat-icon>
            </span>
            <p>{{ t.texto }}</p>
            <strong>{{ t.autor }}</strong>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</section>
