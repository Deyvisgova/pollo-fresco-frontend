<section id="productos" class="productos pb-5"><div class="container"><div class="pagina-banner pagina-banner--full-bleed"><img [src]="contenido().banner_productos_url" alt="Banner de Productos"></div><div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4"><div><h2 class="fw-bold">{{ contenido().titulo_productos }}</h2><p class="text-muted mb-0">{{ contenido().descripcion_productos }}</p></div></div><div class="row g-4"><div class="col-12 col-md-6 col-lg-4" *ngFor="let p of contenido().productos_destacados"><mat-card class="productos__card h-100"><img mat-card-image [src]="p.imagen_url" [alt]="p.nombre"><mat-card-content><h3 class="h5 fw-bold">{{ p.nombre }}</h3><p>{{ p.descripcion }}</p><div class="d-flex justify-content-between align-items-center"><span class="productos__precio">{{ p.precio }}</span><button mat-raised-button color="primary" (click)="pedir(p.nombre)">Pedir</button></div></mat-card-content></mat-card></div></div></div></section>
