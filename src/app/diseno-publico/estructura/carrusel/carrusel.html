<section class="carrusel" aria-label="Promociones destacadas">
  <div class="carrusel__fondo">
    <img [src]="activeSlide.image" [alt]="activeSlide.title" (error)="usarSlideFallback($event)">
  </div>

  <div class="container carrusel__contenido">
    <div class="carrusel__texto">
      <span class="carrusel__etiqueta">Frescura diaria</span>
      <h1>{{ activeSlide.title }}</h1>
      <p>{{ activeSlide.summary }}</p>
      <div class="carrusel__acciones">
        <a mat-raised-button color="primary" routerLink="/productos">
          <mat-icon>storefront</mat-icon>
          Ver productos
        </a>
        <button mat-stroked-button type="button" (click)="abrirWhatsApp()">
          <mat-icon>chat</mat-icon>
          Pedir por WhatsApp
        </button>
      </div>
    </div>

    <article class="carrusel__panel" aria-live="polite">
      <span>Producto destacado</span>
      <h2>{{ activeSlide.title }}</h2>
      <p>{{ activeSlide.detail }}</p>
      <div class="carrusel__panel-imagen">
        <img [src]="activeSlide.image" [alt]="activeSlide.title" (error)="usarSlideFallback($event)">
      </div>
    </article>
  </div>

  <div class="container carrusel__navegacion">
    <div class="carrusel__controles">
      <button mat-icon-button type="button" (click)="previousSlide()" aria-label="Anterior">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <button mat-icon-button type="button" (click)="nextSlide()" aria-label="Siguiente">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
    <div class="carrusel__indicadores">
      <button
        *ngFor="let slide of slides; index as i"
        type="button"
        class="carrusel__indicador"
        [class.carrusel__indicador--activo]="i === activeIndex"
        (click)="goToSlide(i)"
        [attr.aria-label]="'Ir a la diapositiva ' + (i + 1)"
      ></button>
    </div>
  </div>
</section>
