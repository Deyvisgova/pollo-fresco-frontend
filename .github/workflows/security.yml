name: Seguridad frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '40 9 * * 1'

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build

